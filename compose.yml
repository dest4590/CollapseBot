services:
  collapsebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collapsebot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./automatic_responses.yml:/app/automatic_responses.yml:ro
      - ./snippets.yml:/app/snippets.yml:ro
